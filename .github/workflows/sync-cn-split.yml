name: 每日同步 CN Split Tunnels 到 Cloudflare Zero Trust
permissions:
  contents: read

on:
  schedule:
    - cron: '0 3 * * 0'  # 每周日北京时间11:00（UTC 3:00）
  workflow_dispatch:         # 手动触发按钮

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 运行同步脚本
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PROFILE_ID: ${{ secrets.CF_PROFILE_ID }}
          MODE: exclude
          # 新增：控制是否更新分流规则，true/false
          RUN_UPDATE: true
          # 新增：指定要更新的策略序号，逗号分隔，空=不更新
          CF_PROFILE_INDEX: "1"
        run: python cf-zt-cn-split.py